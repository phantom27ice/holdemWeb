asyncapi: '2.6.0'
info:
  title: Cocos 联机德州扑克 WebSocket API
  version: 0.1.0
  description: >
    基于当前德州扑克项目抽取的第一版联机 WebSocket 协议规范。
    范围只覆盖桌面订阅、动作发送、事件广播、快照同步和心跳。
defaultContentType: application/json
servers:
  production:
    url: wss://example.com/ws
    protocol: wss
    description: 生产环境示例
  local:
    url: ws://localhost:3000/ws
    protocol: ws
    description: 本地开发示例
channels:
  /ws:
    publish:
      summary: 客户端 -> 服务端消息
      message:
        oneOf:
          - $ref: '#/components/messages/TableSubscribeMessage'
          - $ref: '#/components/messages/TableReadyMessage'
          - $ref: '#/components/messages/TableStandMessage'
          - $ref: '#/components/messages/TableActionMessage'
          - $ref: '#/components/messages/PingMessage'
    subscribe:
      summary: 服务端 -> 客户端消息
      message:
        oneOf:
          - $ref: '#/components/messages/TableSnapshotMessage'
          - $ref: '#/components/messages/TableEventMessage'
          - $ref: '#/components/messages/TableActionRejectedMessage'
          - $ref: '#/components/messages/TablePlayerUpdateMessage'
          - $ref: '#/components/messages/PongMessage'
components:
  schemas:
    Suit:
      type: string
      enum:
        - Spade
        - Heart
        - Diamond
        - Club
    Street:
      type: string
      enum:
        - PRE_FLOP
        - FLOP
        - TURN
        - RIVER
        - SHOWDOWN
    Phase:
      type: string
      enum:
        - WAITING_FOR_PLAYERS
        - POST_FORCED_BETS
        - DEAL_HOLE_CARDS
        - BETTING_PRE_FLOP
        - DEAL_FLOP
        - BETTING_FLOP
        - DEAL_TURN
        - BETTING_TURN
        - DEAL_RIVER
        - BETTING_RIVER
        - SHOWDOWN
        - PAYOUT
        - HAND_FINISHED
    Role:
      type:
        - string
        - 'null'
      enum:
        - BTN
        - SB
        - BB
        - null
    SeatStatus:
      type: string
      enum:
        - IDLE
        - WAITING
        - ACTING
        - OFFLINE
    ActionType:
      type: string
      enum:
        - FOLD
        - CHECK
        - CALL
        - BET
        - RAISE
        - ALL_IN
    TimeoutFallback:
      type: string
      enum:
        - CHECK
        - FOLD
    ActionRejectedCode:
      type: string
      enum:
        - NOT_YOUR_TURN
        - INVALID_AMOUNT
        - ACTION_NOT_ALLOWED
        - VERSION_EXPIRED
        - HAND_ALREADY_FINISHED
        - TABLE_NOT_FOUND
    Card:
      type: object
      required:
        - suit
        - rank
      properties:
        suit:
          $ref: '#/components/schemas/Suit'
        rank:
          type: integer
          minimum: 2
          maximum: 14
        code:
          type: string
    PotInfo:
      type: object
      required:
        - potId
        - amount
      properties:
        potId:
          type: string
        amount:
          type: integer
    LegalAction:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ActionType'
        toCall:
          type: integer
        minAmountTo:
          type: integer
        maxAmountTo:
          type: integer
    SelfState:
      type: object
      required:
        - seatNo
        - holeCards
        - legalActions
      properties:
        seatNo:
          type: integer
          minimum: 0
        holeCards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        legalActions:
          type: array
          items:
            $ref: '#/components/schemas/LegalAction'
    SeatState:
      type: object
      required:
        - seatNo
        - stack
        - currentBet
        - totalBet
        - isSeated
        - isInHand
        - hasFolded
        - isAllIn
        - role
        - status
      properties:
        seatNo:
          type: integer
          minimum: 0
        userId:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
          format: uri
        stack:
          type: integer
        currentBet:
          type: integer
        totalBet:
          type: integer
        isSeated:
          type: boolean
        isInHand:
          type: boolean
        hasFolded:
          type: boolean
        isAllIn:
          type: boolean
        isReady:
          type: boolean
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/SeatStatus'
        exposedCards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
    TableSnapshot:
      type: object
      required:
        - tableId
        - handId
        - phase
        - street
        - dealerSeat
        - sbSeat
        - bbSeat
        - toActSeat
        - potTotal
        - board
        - pots
        - seats
        - version
      properties:
        tableId:
          type: string
        handId:
          type: integer
        phase:
          $ref: '#/components/schemas/Phase'
        street:
          $ref: '#/components/schemas/Street'
        dealerSeat:
          type: integer
        sbSeat:
          type: integer
        bbSeat:
          type: integer
        toActSeat:
          type: integer
        potTotal:
          type: integer
        board:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        pots:
          type: array
          items:
            $ref: '#/components/schemas/PotInfo'
        seats:
          type: array
          items:
            $ref: '#/components/schemas/SeatState'
        actionDeadlineAt:
          type: integer
        version:
          type: integer
        self:
          $ref: '#/components/schemas/SelfState'
    ActionRequest:
      type: object
      required:
        - requestId
        - tableId
        - handId
        - expectedVersion
        - action
      properties:
        requestId:
          type: string
        tableId:
          type: string
        handId:
          type: integer
        expectedVersion:
          type: integer
        action:
          $ref: '#/components/schemas/ActionType'
        amountTo:
          type: integer
    ActionRejected:
      type: object
      required:
        - requestId
        - tableId
        - handId
        - code
        - message
      properties:
        requestId:
          type: string
        tableId:
          type: string
        handId:
          type: integer
        code:
          $ref: '#/components/schemas/ActionRejectedCode'
        message:
          type: string
        latestVersion:
          type: integer
    TableSubscribePayload:
      type: object
      required:
        - tableId
      properties:
        tableId:
          type: string
    TableReadyPayload:
      type: object
      required:
        - tableId
      properties:
        tableId:
          type: string
    TableStandPayload:
      type: object
      required:
        - tableId
      properties:
        tableId:
          type: string
    PingPayload:
      type: object
      required:
        - ts
      properties:
        ts:
          type: integer
    TablePlayerUpdatePayload:
      type: object
      required:
        - tableId
        - seat
      properties:
        tableId:
          type: string
        seat:
          $ref: '#/components/schemas/SeatState'
    HandStartedEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
      properties:
        type:
          type: string
          const: HAND_STARTED
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
    CardsDealtEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - seatNo
        - count
      properties:
        type:
          type: string
          const: CARDS_DEALT
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        seatNo:
          type: integer
        count:
          type: integer
    BoardDealtEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - street
        - cards
      properties:
        type:
          type: string
          const: BOARD_DEALT
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        street:
          $ref: '#/components/schemas/Street'
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
    ActionAppliedEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - seatNo
        - action
        - amount
      properties:
        type:
          type: string
          const: ACTION_APPLIED
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        seatNo:
          type: integer
        action:
          $ref: '#/components/schemas/ActionType'
        amount:
          type: integer
        amountTo:
          type: integer
    TurnTimeoutEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - seatNo
        - fallback
      properties:
        type:
          type: string
          const: TURN_TIMEOUT
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        seatNo:
          type: integer
        fallback:
          $ref: '#/components/schemas/TimeoutFallback'
    ShowdownRevealEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - seatNo
        - cards
      properties:
        type:
          type: string
          const: SHOWDOWN_REVEAL
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        seatNo:
          type: integer
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
    PotAwardedEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
        - potId
        - winners
        - amount
      properties:
        type:
          type: string
          const: POT_AWARDED
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
        potId:
          type: string
        winners:
          type: array
          items:
            type: integer
        amount:
          type: integer
    HandFinishedEvent:
      type: object
      required:
        - type
        - tableId
        - handId
        - version
        - ts
      properties:
        type:
          type: string
          const: HAND_FINISHED
        tableId:
          type: string
        handId:
          type: integer
        version:
          type: integer
        ts:
          type: integer
    TableEvent:
      oneOf:
        - $ref: '#/components/schemas/HandStartedEvent'
        - $ref: '#/components/schemas/CardsDealtEvent'
        - $ref: '#/components/schemas/BoardDealtEvent'
        - $ref: '#/components/schemas/ActionAppliedEvent'
        - $ref: '#/components/schemas/TurnTimeoutEvent'
        - $ref: '#/components/schemas/ShowdownRevealEvent'
        - $ref: '#/components/schemas/PotAwardedEvent'
        - $ref: '#/components/schemas/HandFinishedEvent'
  messages:
    TableSubscribeMessage:
      name: table.subscribe
      title: 订阅牌桌
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.subscribe
          payload:
            $ref: '#/components/schemas/TableSubscribePayload'
          requestId:
            type: string
          ts:
            type: integer
    TableReadyMessage:
      name: table.ready
      title: 准备消息
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.ready
          payload:
            $ref: '#/components/schemas/TableReadyPayload'
          requestId:
            type: string
          ts:
            type: integer
    TableStandMessage:
      name: table.stand
      title: 站起消息
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.stand
          payload:
            $ref: '#/components/schemas/TableStandPayload'
          requestId:
            type: string
          ts:
            type: integer
    TableActionMessage:
      name: table.action
      title: 手牌动作
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.action
          payload:
            $ref: '#/components/schemas/ActionRequest'
          requestId:
            type: string
          ts:
            type: integer
    PingMessage:
      name: ping
      title: 心跳请求
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: ping
          payload:
            $ref: '#/components/schemas/PingPayload'
          requestId:
            type: string
          ts:
            type: integer
    TableSnapshotMessage:
      name: table.snapshot
      title: 全量牌桌快照
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.snapshot
          payload:
            $ref: '#/components/schemas/TableSnapshot'
          requestId:
            type: string
          ts:
            type: integer
    TableEventMessage:
      name: table.event
      title: 牌桌事件
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.event
          payload:
            $ref: '#/components/schemas/TableEvent'
          requestId:
            type: string
          ts:
            type: integer
    TableActionRejectedMessage:
      name: table.actionRejected
      title: 动作拒绝
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.actionRejected
          payload:
            $ref: '#/components/schemas/ActionRejected'
          requestId:
            type: string
          ts:
            type: integer
    TablePlayerUpdateMessage:
      name: table.playerUpdate
      title: 座位状态更新
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: table.playerUpdate
          payload:
            $ref: '#/components/schemas/TablePlayerUpdatePayload'
          requestId:
            type: string
          ts:
            type: integer
    PongMessage:
      name: pong
      title: 心跳响应
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            const: pong
          payload:
            $ref: '#/components/schemas/PingPayload'
          requestId:
            type: string
          ts:
            type: integer
